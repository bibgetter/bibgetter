<?xml version="1.0" encoding="UTF-8"?>
<config>
  <output_align>true</output_align>
  <output_fieldcase>lower</output_fieldcase>

  <sortingtemplate name="tool">
    <sort order="1">
      <sortitem order="1">entrykey</sortitem>
    </sort>
  </sortingtemplate>

  <datamodel>
    <fields>
      <field fieldtype="field" datatype="literal">mrnumber</field>
    </fields>
    <entryfields>
      <field>mrnumber</field>
    </entryfields>
  </datamodel>

  <!--
    Preserve legacy BibTeX field names rather than converting them to their
    BibLaTeX canonical equivalents.  biber in tool mode maps "journal" to
    "journaltitle" during input processing; the sourcemap below undoes that
    so the output file still uses "journal".
    The "year" vs "date" conversion is handled on the command line via
    the output-legacy-dates flag passed by bibgetter's format() function.
  -->
  <sourcemap>
    <maps datatype="bibtex" map_overwrite="1">
      <map>
        <map_step map_field_source="journaltitle" map_field_target="journal"/>
      </map>
    </maps>
  </sourcemap>

</config>
